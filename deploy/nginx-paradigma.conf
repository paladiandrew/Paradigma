# Пример для Paradigma: фронт (SPA) + прокси на FastAPI.
# Замените YOUR_DOMAIN на ваш домен (например paradigma.example.ru).
#
# Установка:
#   sudo cp deploy/nginx-paradigma.conf /etc/nginx/sites-available/paradigma
#   sudo ln -sf /etc/nginx/sites-available/paradigma /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d YOUR_DOMAIN
# После certbot в этом файле обычно появятся ssl_certificate и listen 443.

upstream paradigma_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Раскомментируйте после получения сертификата и настройте редирект на HTTPS:
    # return 301 https://$host$request_uri;

    root /opt/paradigma/frontend/dist;
    index index.html;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://paradigma_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /uploads/ {
        proxy_pass http://paradigma_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://paradigma_api;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
