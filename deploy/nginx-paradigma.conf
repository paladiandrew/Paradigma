# Paradigma: SPA + прокси на Uvicorn (127.0.0.1:8000).
# Домен продакшена: paradigma-bjj.ru
#
# Установка:
#   sudo cp deploy/nginx-paradigma.conf /etc/nginx/sites-available/paradigma
#   sudo ln -sf /etc/nginx/sites-available/paradigma /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS:
#   sudo certbot --nginx -d paradigma-bjj.ru -d www.paradigma-bjj.ru

upstream paradigma_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name paradigma-bjj.ru www.paradigma-bjj.ru;

    root /opt/paradigma/frontend/dist;
    index index.html;

    client_max_body_size 25m;

    # После certbot обычно настраивается редирект HTTP→HTTPS автоматически.

    location /api/ {
        proxy_pass http://paradigma_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /uploads/ {
        proxy_pass http://paradigma_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://paradigma_api;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
